<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>nodrix — your own IoT cloud, on Cloudflare</title>
    <!-- noindex, but follow links so the footer backlink passes equity to nodrix.live -->
    <meta name="robots" content="noindex, follow" />
    <meta name="theme-color" content="#ff6a45" />

    <link rel="icon" href="/favicon.ico" sizes="32x32" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="nodrix" />
    <meta property="og:title" content="nodrix — your own IoT cloud, on Cloudflare" />
    <meta
      property="og:description"
      content="Open-source IoT platform that deploys to your own Cloudflare account. Hardware POSTs over HTTPS, realtime drag-and-drop dashboards, automations, and a clean read API."
    />
    <meta property="og:image" content="/og.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="nodrix — your own IoT cloud, on Cloudflare" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="nodrix — your own IoT cloud, on Cloudflare" />
    <meta
      name="twitter:description"
      content="Open-source IoT platform that deploys to your own Cloudflare account. Hardware POSTs over HTTPS, realtime drag-and-drop dashboards, automations, and a clean read API."
    />
    <meta name="twitter:image" content="/og.png" />
    <meta name="twitter:image:alt" content="nodrix — your own IoT cloud, on Cloudflare" />
  </head>
  <body class="h-full bg-neutral-50 text-neutral-900 antialiased dark:bg-neutral-900 dark:text-neutral-100">
    <!-- Inline theme bootstrap: applies the .dark class synchronously to avoid
         a light-mode flash before the JS bundle loads and Pinia takes over. -->
    <script>
      (function () {
        try {
          var v = localStorage.getItem('nodrix:theme');
          var dark = v === 'dark' || ((v === 'system' || v === null) && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) document.documentElement.classList.add('dark');
        } catch (_) {}
      })();
    </script>
    <div id="app" class="h-full"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
