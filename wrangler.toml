name = "nodrix"
main = "worker/src/index.ts"
compatibility_date = "2025-05-01"
compatibility_flags = ["nodejs_compat"]

# Build the Vue SPA before wrangler deploys, so ASSETS has content.
# Cloudflare Workers Builds + the Deploy button run `npx wrangler deploy` at
# the repo root; this build step makes that one command sufficient.
#
# build:version writes worker/src/version.gen.ts with the running build's
# commit SHA (from WORKERS_CI_COMMIT_SHA in CI, git rev-parse locally) so the
# Settings → Version & updates section can compare against upstream.
#
# build:migrations bundles worker/src/db/migrations/*.sql into a TS array the
# Worker reads at runtime. The auto-migrator (worker/src/db/auto-migrate.ts)
# applies anything missing on the first request after each deploy, so users
# never need to run `wrangler d1 migrations apply` by hand.
# Anchor to repo root first — Workers Builds runs this from the repo root,
# but local `wrangler deploy --dry-run` (invoked by the worker's build script
# from worker/) starts in worker/. The cd-fallback makes both cases work.
[build]
command = "[ -f scripts/gen-version.ts ] || cd ..; bun install && bun scripts/gen-version.ts && bun scripts/gen-migrations.ts && bun run --filter @nodrix/web build"

# Vue SPA built by `web/` workspace is served as static assets.
# `run_worker_first = true` is REQUIRED: without it, Cloudflare's edge serves
# index.html for any unmatched GET (SPA fallback) before the Worker runs, which
# silently intercepts OAuth callbacks like /v1/auth/callback/google. With this
# flag, the Worker runs for every method and falls back to ASSETS.fetch() only
# for paths it doesn't handle.
[assets]
directory = "web/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = true

# D1 — metadata only (users, projects, devices, dashboards, tokens).
# NEVER any telemetry point. See plan §3.
[[d1_databases]]
binding = "DB"
database_name = "nodrix"
database_id = "PLACEHOLDER_FILLED_BY_DEPLOY_OR_WRANGLER"
migrations_dir = "worker/src/db/migrations"

# R2 — cold telemetry history, NDJSON partitioned by device + hour.
[[r2_buckets]]
binding = "R2"
bucket_name = "nodrix-telemetry"

# KV — short-TTL read cache for /state + cached Access JWKS.
[[kv_namespaces]]
binding = "KV"
id = "PLACEHOLDER_FILLED_BY_DEPLOY_OR_WRANGLER"

# Durable Objects.
[[durable_objects.bindings]]
name = "DEVICE_DO"
class_name = "DeviceDO"

[[durable_objects.bindings]]
name = "DASHBOARD_DO"
class_name = "DashboardDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["DeviceDO", "DashboardDO"]

# Workflows — provisioning only. Never on the hot path. See plan §10.
[[workflows]]
name = "nodrix-provision"
binding = "PROVISION"
class_name = "Provision"

# Plaintext vars. Settings → Version & updates polls the upstream repo to
# tell owners when a new commit is on main. Fork the upstream and override
# this if you're tracking a different canonical source.
[vars]
NODRIX_UPSTREAM_REPO = "decoded-cipher/nodrix"

# Secrets (KMS-encrypted). The Deploy to Cloudflare wizard reads this list
# and prompts for each one during setup; `wrangler deploy` also fails if
# they're missing locally. OAuth callback URLs and Better Auth's baseURL are
# derived from each request's origin, so no APP_URL env var is needed.
[secrets]
required = ["BETTER_AUTH_SECRET"]

[observability]
enabled = true
